[gcode_macro _CALIBRATION_SWITCH]
variable_x:                62.5
variable_y:                22
variable_z:                50.00
gcode:

[tools_calibrate]
pin:                       ^Super8Pro:PC3 
travel_speed:              20
spread:                    7
lower_z:                   1.0              # The speed (in mm/sec) to move tools down onto the probe
speed:                     1.5              # The speed (in mm/sec) to retract between probes
lift_speed:                4
final_lift_z:              3
samples:                   5
samples_result:            median           # median, average
sample_retract_dist:       1
samples_tolerance:         0.02
samples_tolerance_retries: 2                # Decrease -> higher nozzle
trigger_to_bottom_z:       -0.00

;[gcode_button sexball]
;pin:                       ^Super8Pro:PC3    # BLTouch  
;press_gcode:
;  M118 Sexball pressed
;release_gcode:
;  M118 Sexball released

[gcode_macro _CALIBRATE_MOVE_OVER_PROBE]
gcode:
    BED_MESH_CLEAR
    G0 Z{printer["gcode_macro _CALIBRATION_SWITCH"].z} F10000
    G0 X{printer["gcode_macro _CALIBRATION_SWITCH"].x} Y{printer["gcode_macro _CALIBRATION_SWITCH"].y} F10000

[gcode_macro CALIBRATE_ALL_OFFSETS]
gcode:
    {% set tools = printer['ktc_toolchanger malaquitte'].tools %}
    # Tool 0
    T{tools[0]}
    {% if printer["gcode_macro _TOOLCHANGER_CLEAN_NOZZLE"] is defined %}
        _TOOLCHANGER_CLEAN_NOZZLE
    {% endif %}
    _CALIBRATE_MOVE_OVER_PROBE
    M109 S150
    TOOL_LOCATE_SENSOR
    M104 S0
    {% for tool in tools[1:] %}
        T{tool}
        {% if printer["gcode_macro _TOOLCHANGER_CLEAN_NOZZLE"] is defined %}
            _TOOLCHANGER_CLEAN_NOZZLE
        {% endif %}
        M104 T{tool} S150
        _CALIBRATE_MOVE_OVER_PROBE
        M109 T{tool} S150
        TOOL_CALIBRATE_TOOL_OFFSET
        TOOL_CALIBRATE_SAVE_TOOL_OFFSET SECTION="ktc_tool {tool}" ATTRIBUTE=init_offset
        M104 S0
    {% endfor %}

    # Finish up
    T{tools[0]}


[gcode_macro CALIBRATE_ONE_OFFSET]
gcode:
    # Tool 0
    T0
    {% if printer["gcode_macro _TOOLCHANGER_CLEAN_NOZZLE"] is defined %}
        _TOOLCHANGER_CLEAN_NOZZLE
    {% endif %}
    _CALIBRATE_MOVE_OVER_PROBE
    M104 S150
    TOOL_LOCATE_SENSOR
    M104 S0
    T{params.TOOL}
    {% if printer["gcode_macro _TOOLCHANGER_CLEAN_NOZZLE"] is defined %}
        _TOOLCHANGER_CLEAN_NOZZLE
    {% endif %}
    M104 S150 T{params.TOOL}
    _CALIBRATE_MOVE_OVER_PROBE
    TOOL_CALIBRATE_TOOL_OFFSET
    TOOL_CALIBRATE_SAVE_TOOL_OFFSET SECTION="ktc_tool {params.TOOL}" ATTRIBUTE=init_offset
    M104 S0

    # Finish up
    T0


[gcode_macro CALIBRATE_NOZZLE_PROBE_OFFSET]
gcode:
    {% if printer["gcode_macro _TOOLCHANGER_CLEAN_NOZZLE"] is defined %}
        _TOOLCHANGER_CLEAN_NOZZLE
    {% endif %}
    _CALIBRATE_MOVE_OVER_PROBE
    M109 S150
    TOOL_LOCATE_SENSOR
    TOOL_CALIBRATE_PROBE_OFFSET PROBE="tool_probe T0"
    M104 S0

